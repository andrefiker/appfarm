<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PsychMD</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1419;--surface:#1A2027;--card:#1E2830;--card-h:#243038;--border:#2A3744;--border-l:#344452;--text:#E8ECF0;--muted:#8899A6;--dim:#5C6E7E;--sage:#7FB69E;--sage-bg:rgba(127,182,158,.08);--sage-br:rgba(127,182,158,.2);--amber:#E8B86D;--amber-bg:rgba(232,184,109,.08);--coral:#E07A6B;--coral-bg:rgba(224,122,107,.08);--sky:#6BA3D0;--sky-bg:rgba(107,163,208,.08);--lav:#9B8EC4;--lav-bg:rgba(155,142,196,.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
::-webkit-scrollbar{width:0;height:0}::placeholder{color:var(--dim)}input,button{font-family:inherit}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.ambient{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient .orb1{position:absolute;top:-120px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,var(--sage-bg),transparent 70%);filter:blur(60px);animation:float1 12s ease-in-out infinite}
.ambient .orb2{position:absolute;bottom:-60px;left:-100px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,var(--amber-bg),transparent 70%);filter:blur(50px);animation:float2 15s ease-in-out infinite}
.bnav{display:flex;justify-content:space-around;align-items:center;padding:8px 0 12px;background:rgba(26,32,39,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;flex-shrink:0}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 10px;border-radius:12px}
.bnav-item svg{width:22px;height:22px}.bnav-item span{font-size:10px;letter-spacing:.02em}.bnav-item.active span{font-weight:600}
.bnav-dot{width:4px;height:4px;border-radius:2px;background:var(--sage);margin-top:-1px}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.bcard:active{transform:scale(.98);opacity:.9}
.chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.active{background:rgba(127,182,158,.12);color:var(--sage);border-color:rgba(127,182,158,.35)}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:24px;transition:border .2s}
.search-bar:focus-within{border-color:var(--sage-br)}.search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%}
.sheader{padding:20px 20px 8px}.sheader h1{font-family:'Fraunces',serif;font-size:26px;font-weight:500;letter-spacing:-.02em;line-height:1.2}
.sheader .sub{color:var(--muted);font-size:14px;margin-top:6px;line-height:1.5}
.back-btn{cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;color:var(--muted);font-size:14px}
.progress{display:flex;gap:4px;margin-bottom:6px}.progress .bar{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}.progress .bar.done{background:var(--sage)}
.sev-bar{width:100%;height:6px;border-radius:3px;background:var(--border);overflow:hidden}.sev-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:600;transition:all .2s}.tab.active{border-bottom-color:var(--sage);color:var(--sage)}
.stat{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}.stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}.stat .val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--sage);margin-bottom:2px}.stat .sub{font-size:11px;color:var(--dim)}
.do-item{display:flex;gap:10px;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:8px;font-size:13px}.do-item.do{background:var(--sage-bg);border:1px solid var(--sage-br)}.do-item.dont{background:var(--coral-bg);border:1px solid rgba(224,122,107,.15)}
.crisis{background:linear-gradient(135deg,var(--coral-bg),var(--coral-bg));border:1px solid rgba(224,122,107,.2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}.crisis .title{font-size:13px;font-weight:600;color:var(--coral);margin-bottom:2px}.crisis .desc{font-size:12px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.span2{grid-column:span 2}
.sec-label{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.check-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}.check-row p{font-size:14px;line-height:1.5}
.inst-badge{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:700;flex-shrink:0}
.inst-meta{display:flex;gap:12px;font-size:11px;color:var(--dim)}
.assess-link{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer}.assess-link:active{background:var(--card)}
.opt-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--text);text-align:left;width:100%;display:block;font-family:inherit}
.opt-btn:active{transform:scale(.98);border-color:var(--sage-br);background:var(--sage-bg)}
.opt-btn.selected{border-color:var(--sage);background:var(--sage-bg)}
.gauge-track{width:100%;height:12px;border-radius:6px;background:var(--border);overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.gauge-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--dim)}
.result-score{font-family:'Fraunces',serif;font-size:48px;font-weight:600;text-align:center;margin:16px 0 4px}
.result-label{text-align:center;font-size:16px;font-weight:600;margin-bottom:4px}
.result-desc{text-align:center;font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.med-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:12px;margin-bottom:8px;background:var(--card);border:1px solid var(--border);cursor:pointer}
.med-row:active{background:var(--card-h)}
.med-field{margin-bottom:16px}.med-field .mf-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.med-field p{font-size:14px;line-height:1.6}
.interact-input{display:flex;gap:8px;margin-bottom:12px}
.interact-input input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.interact-input input:focus{border-color:var(--sage-br)}
.interact-btn{background:var(--sage);border:none;border-radius:10px;padding:10px 16px;color:var(--bg);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.interact-btn:active{opacity:.8}
.tag{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;margin-right:6px;margin-bottom:4px}
</style>
</head>

// ========== ASSESSMENTS ==========
function startAssess(idx){curAssess=INST[idx];assStep=0;assAnswers=[];nav('assessRun');}
function answerAssess(val){assAnswers.push(val);assStep++;if(assStep>=curAssess.qs.length){nav('assessResult');}else{render();document.getElementById('screen').scrollTop=0;}}

function renderAssess(){
  return '<div class="sheader"><h1>Autoavalia\u00e7\u00f5es</h1><p class="sub">Instrumentos validados \u2014 responda com honestidade</p></div><div style="padding:0 20px 20px">'+INST.map(function(inst,idx){return '<div class="bcard" style="margin-bottom:10px;border-color:'+inst.color+'22" onclick="startAssess('+idx+')"><div style="display:flex;align-items:center;gap:14px"><div class="inst-badge" style="background:'+inst.color+'15;border:1px solid '+inst.color+'33;color:'+inst.color+'">'+inst.name.slice(0,3)+'</div><div style="flex:1"><p style="font-family:\'Fraunces\',serif;font-size:15px;font-weight:500;margin-bottom:3px">'+inst.name+'</p><p style="font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.4">'+inst.desc+'</p><div class="inst-meta"><span>\u23f1 '+inst.time+'</span><span>'+inst.items+' itens</span><span style="color:'+inst.color+'">'+inst.target+'</span></div></div></div></div>';}).join('')+'<div style="margin-top:8px;padding:14px;border-radius:12px;background:var(--surface);border:1px solid var(--border)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+IC.chart()+'<p style="font-size:13px;font-weight:600">Acompanhe ao Longo do Tempo</p></div><p style="font-size:12px;color:var(--muted);line-height:1.5">Todos os dados ficam no seu dispositivo.</p></div></div>';
}

function renderAssessRun(){
  var a=curAssess,q=a.qs[assStep],total=a.qs.length;
  return '<div class="sheader"><div class="back-btn" onclick="'+(assStep>0?'assStep--;assAnswers.pop();render()':'nav(\'assess\')')+'">' +IC.back()+' Voltar</div><h1>'+a.name+'</h1></div><div style="padding:0 20px;margin-bottom:8px"><div class="progress">'+a.qs.map(function(_,i){return '<div class="bar '+(i<assStep?'done':'')+'"></div>';}).join('')+'</div><p style="font-size:12px;color:var(--muted)">Pergunta '+(assStep+1)+' de '+total+'</p></div><div style="padding:0 20px 20px"><p style="font-size:16px;font-weight:500;line-height:1.5;margin-bottom:20px;color:var(--text)">Nas \u00faltimas 2 semanas, com que frequ\u00eancia voc\u00ea foi incomodado(a) por:</p><div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px"><p style="font-size:15px;line-height:1.6;font-weight:500">'+q+'</p></div><div style="display:flex;flex-direction:column;gap:8px">'+a.opts.map(function(opt,idx){return '<button class="opt-btn" onclick="answerAssess('+idx+')"><div style="display:flex;align-items:center;gap:12px"><div style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:600;color:var(--dim)">'+idx+'</div><span>'+opt+'</span></div></button>';}).join('')+'</div></div>';
}

function renderAssessResult(){
  var a=curAssess,score=assAnswers.reduce(function(s,v){return s+v;},0),maxScore=a.qs.length*(a.opts.length-1);
  var band=a.bands[0];for(var i=0;i<a.bands.length;i++){if(score<=a.bands[i].max){band=a.bands[i];break;}}
  var pct=Math.round(score/maxScore*100);
  return '<div class="sheader"><div class="back-btn" onclick="nav(\'assess\')">'+IC.back()+' Voltar</div><h1>Resultado: '+a.name+'</h1></div><div style="padding:0 20px 20px"><div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center"><p class="result-score" style="color:'+band.color+'">'+score+'<span style="font-size:20px;color:var(--dim)"> / '+maxScore+'</span></p><p class="result-label" style="color:'+band.color+'">'+band.label+'</p><div style="margin:16px 0"><div class="gauge-track"><div class="gauge-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--sage),'+band.color+')"></div></div><div class="gauge-labels"><span>M\u00ednimo</span><span>M\u00e1ximo</span></div></div><p class="result-desc">'+band.desc+'</p></div><div style="background:var(--sage-bg);border:1px solid var(--sage-br);border-radius:12px;padding:14px;margin-bottom:16px"><p style="font-size:12px;color:var(--muted);line-height:1.6;display:flex;align-items:flex-start;gap:8px">'+IC.check()+' Este resultado é apenas um rastreamento. Para um diagn\u00f3stico, consulte um profissional de sa\u00fade mental.</p></div><div class="bcard" onclick="startAssess(INST.indexOf(curAssess))" style="border-color:var(--sage-br);text-align:center;margin-bottom:10px"><p style="font-size:14px;font-weight:600;color:var(--sage)">Refazer Avalia\u00e7\u00e3o</p></div><div class="bcard" onclick="nav(\'assess\')" style="text-align:center"><p style="font-size:14px;font-weight:500;color:var(--muted)">Outras Avalia\u00e7\u00f5es</p></div></div>';
}

function renderMedClass(){
  var cls=MEDS[curMedClass];
  return '<div class="sheader"><div class="back-btn" onclick="nav(\'meds\')">'+IC.back()+' Voltar</div><h1>'+cls.name+'</h1><p class="sub">'+cls.desc+'</p></div><div style="padding:8px 20px 20px">'+cls.drugs.map(function(d,idx){return '<div class="med-row" onclick="curMed={cls:'+curMedClass+',drug:'+idx+'};nav(\'medDetail\')"><div style="display:flex;align-items:center;gap:12px">'+IC.pill(cls.color)+'<div><p style="font-size:15px;font-weight:500">'+d.name+'</p><p style="font-size:12px;color:var(--dim)">'+d.brands+'</p></div></div>'+IC.arrow('var(--dim)')+'</div>';}).join('')+'</div>';
}

function renderMedDetail(){
  var cls=MEDS[curMed.cls],d=cls.drugs[curMed.drug];
  return '<div class="sheader"><div class="back-btn" onclick="nav(\'medClass\')">'+IC.back()+' Voltar</div><h1>'+d.name+'</h1><p class="sub">'+d.brands+'</p></div><div style="padding:8px 20px 20px"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px"><span class="tag" style="background:'+cls.color+'18;color:'+cls.color+'">'+d.classe+'</span></div><div class="med-field"><p class="mf-label">Indica\u00e7\u00f5es</p><p>'+d.indica+'</p></div><div class="med-field"><p class="mf-label">Como Funciona</p><p>'+d.mecanismo+'</p></div><div class="med-field"><p class="mf-label">Dose Usual</p><p>'+d.dose+'</p></div><div class="med-field"><p class="mf-label">Tempo para Efeito</p><p>'+d.tempo+'</p></div><div class="med-field"><p class="mf-label">Efeitos Colaterais Comuns</p><p>'+d.efeitos+'</p></div><div style="background:var(--coral-bg);border:1px solid rgba(224,122,107,.2);border-radius:12px;padding:14px;margin-bottom:16px"><p class="mf-label" style="color:var(--coral)">Efeitos Graves</p><p style="font-size:14px;line-height:1.6">'+d.graves+'</p></div><div class="med-field"><p class="mf-label">Intera\u00e7\u00f5es Importantes</p><p>'+d.interacoes+'</p></div><div style="background:var(--sage-bg);border:1px solid var(--sage-br);border-radius:12px;padding:14px"><p style="font-size:12px;color:var(--muted);line-height:1.6">'+IC.check()+' Nunca inicie, interrompa ou altere a dose sem orienta\u00e7\u00e3o m\u00e9dica.</p></div></div>';
}

// ========== INTERACTION CHECKER ==========
function addInteractMed(){var el=document.getElementById('iInput');var v=el.value.trim();if(v){interactMeds.push(v);el.value='';checkInteractions();render();}}
function removeInteractMed(idx){interactMeds.splice(idx,1);checkInteractions();render();}
function checkInteractions(){
  interactResults=[];
  for(var i=0;i<interactMeds.length;i++){
    for(var j=i+1;j<interactMeds.length;j++){
      var a=interactMeds[i].toLowerCase(),b=interactMeds[j].toLowerCase();
      for(var k=0;k<INTERACTIONS.length;k++){
        var ix=INTERACTIONS[k];
        if((ix.a.toLowerCase()===a&&ix.b.toLowerCase()===b)||(ix.a.toLowerCase()===b&&ix.b.toLowerCase()===a)){
          interactResults.push({a:interactMeds[i],b:interactMeds[j],sev:ix.sev,desc:ix.desc});
        }
      }
    }
  }
}

function renderInteract(){
  var sevColors={grave:'var(--coral)',moderada:'var(--amber)',leve:'var(--sage)'};
  return '<div class="sheader"><div class="back-btn" onclick="nav(\'meds\')">'+IC.back()+' Voltar</div><h1>Verificador de Intera\u00e7\u00f5es</h1><p class="sub">Adicione seus medicamentos para verificar intera\u00e7\u00f5es</p></div><div style="padding:8px 20px 20px"><div class="interact-input"><input id="iInput" placeholder="Nome do medicamento..." onkeydown="if(event.key===\'Enter\')addInteractMed()"><button class="interact-btn" onclick="addInteractMed()">Adicionar</button></div>'+(interactMeds.length?'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">'+interactMeds.map(function(m,i){return '<span class="chip active" onclick="removeInteractMed('+i+')" style="cursor:pointer">'+m+' \u00d7</span>';}).join('')+'</div>':'<p style="font-size:13px;color:var(--dim);margin-bottom:16px">Adicione pelo menos 2 medicamentos para verificar intera\u00e7\u00f5es.</p>')+(interactResults&&interactResults.length?'<p class="sec-label">Intera\u00e7\u00f5es Encontradas</p>'+interactResults.map(function(r){var c=sevColors[r.sev]||'var(--amber)';return '<div class="bcard" style="margin-bottom:10px;border-color:'+c+'33"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><p style="font-size:14px;font-weight:600">'+r.a+' + '+r.b+'</p><span class="tag" style="background:'+c+'22;color:'+c+'">'+r.sev.charAt(0).toUpperCase()+r.sev.slice(1)+'</span></div><p style="font-size:13px;color:var(--muted);line-height:1.5">'+r.desc+'</p></div>';}).join(''):'')+(interactMeds.length>=2&&(!interactResults||!interactResults.length)?'<div style="background:var(--sage-bg);border:1px solid var(--sage-br);border-radius:12px;padding:16px;text-align:center"><p style="font-size:14px;color:var(--sage);font-weight:500;margin-bottom:4px">\u2713 Nenhuma intera\u00e7\u00e3o encontrada</p><p style="font-size:12px;color:var(--muted)">Nenhuma intera\u00e7\u00e3o conhecida entre esses medicamentos no nosso banco de dados.</p></div>':'')+'<div style="margin-top:16px;padding:14px;border-radius:12px;background:var(--surface);border:1px solid var(--border)"><p style="font-size:12px;color:var(--muted);line-height:1.6">'+IC.alert('var(--amber)')+' Este verificador n\u00e3o substitui a orienta\u00e7\u00e3o do seu m\u00e9dico ou farmac\u00eautico. Sempre consulte um profissional.</p></div></div>';
}

// ========== DOCTOR QUESTIONS ==========
function renderDoctorQs(){
  var qs=['Quais s\u00e3o os poss\u00edveis efeitos colaterais desta medica\u00e7\u00e3o?','Quanto tempo leva para eu sentir os efeitos?','Posso tomar com meus outros medicamentos?','O que acontece se eu esquecer uma dose?','Existem alimentos ou bebidas que devo evitar?','Quando devo retornar para reavaliar?','Quais sinais de alerta devo observar?','Existe risco de depend\u00eancia?','Posso parar de tomar por conta pr\u00f3pria?','H\u00e1 alternativas n\u00e3o-medicamentosas?','Esta medica\u00e7\u00e3o afeta a capacidade de dirigir?','Posso consumir \u00e1lcool durante o tratamento?'];
  return '<div class="sheader"><div class="back-btn" onclick="nav(\'meds\')">'+IC.back()+' Voltar</div><h1>Perguntas para o M\u00e9dico</h1><p class="sub">Leve estas perguntas na sua pr\u00f3xima consulta</p></div><div style="padding:8px 20px 20px">'+qs.map(function(q,i){return '<div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:50%;background:var(--sage-bg);border:1px solid var(--sage-br);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:var(--sage)">'+(i+1)+'</div><p style="font-size:14px;line-height:1.5;padding-top:4px">'+q+'</p></div>';}).join('')+'<div style="margin-top:8px;padding:14px;border-radius:12px;background:var(--sage-bg);border:1px solid var(--sage-br)"><p style="font-size:12px;color:var(--muted);line-height:1.6">'+IC.check()+' Anote as respostas do seu m\u00e9dico. Voc\u00ea pode tirar uma captura de tela desta lista para levar na consulta.</p></div></div>';
}

// ========== MAIN RENDER ==========
function render(){
  var el=document.getElementById('screen'),html='';
  switch(S){
    case 'home':html=renderHome();break;case 'check':html=renderCheck();break;
    case 'learn':html=renderLearn();break;case 'detail':html=renderDetail();break;
    case 'assess':html=renderAssess();break;case 'assessRun':html=renderAssessRun();break;case 'assessResult':html=renderAssessResult();break;
    case 'meds':html=renderMeds();break;case 'medClass':html=renderMedClass();break;case 'medDetail':html=renderMedDetail();break;
    case 'interact':html=renderInteract();break;case 'doctorQs':html=renderDoctorQs();break;
    default:html=renderHome();
  }
  el.innerHTML=html;el.style.animation='none';el.offsetHeight;el.style.animation='fadeIn .3s ease-out';renderNav();
}
render();
</script>
