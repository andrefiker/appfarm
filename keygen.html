<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Códigos — App Farm Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#111;color:#eee;padding:20px;min-height:100vh}
        h1{font-size:1.3rem;margin-bottom:20px;color:#8ab87a}
        .gate{max-width:300px;margin:120px auto;text-align:center}
        .gate input{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:12px;color:#eee;font-size:1rem;width:100%;text-align:center;margin:16px 0;outline:none}
        .gate input:focus{border-color:#6b8f5e}
        .gate button{padding:12px 24px;background:#6b8f5e;color:#fff;border:none;border-radius:6px;font-size:.95rem;cursor:pointer;width:100%}
        .gate p{color:#666;font-size:.85rem;margin-top:8px}
        .gate .err{color:#c46b5a;font-size:.85rem;margin-top:8px;display:none}
        .app-content{display:none}
        label{display:block;font-size:.75rem;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
        select,input{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:10px 12px;color:#eee;font-size:.9rem;width:100%;outline:none}
        select:focus,input:focus{border-color:#6b8f5e}
        .form{max-width:400px;display:flex;flex-direction:column;gap:14px}
        button{padding:12px 20px;background:#6b8f5e;color:#fff;border:none;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;width:100%;margin-top:4px}
        button:hover{background:#8ab87a}
        .result{display:none;margin-top:20px;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:24px;max-width:400px;text-align:center}
        .result-label{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
        .result-code{font-family:monospace;font-size:2rem;color:#8ab87a;letter-spacing:4px;margin-bottom:4px;cursor:pointer}
        .result-meta{font-size:.8rem;color:#666;margin-top:10px;line-height:1.6}
        .copied{font-size:.8rem;color:#8ab87a;margin-top:6px;opacity:0;transition:opacity .3s}
        .copied.show{opacity:1}
        .copy-btn{background:#333;color:#aaa;font-size:.82rem;margin-top:12px}
        .copy-btn:hover{background:#444;color:#eee}
        .history{margin-top:28px;max-width:500px}
        .history h2{font-size:.85rem;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
        .h-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#1a1a1a;border:1px solid #222;border-radius:6px;margin-bottom:6px;font-size:.82rem}
        .h-item .name{color:#eee}
        .h-item .app{color:#888;font-size:.75rem}
        .h-item .code{font-family:monospace;color:#8ab87a;letter-spacing:1px}
        .h-item .date{color:#555;font-size:.72rem}
        .h-actions{display:flex;gap:8px;margin-top:12px}
        .h-actions button{background:#222;color:#888;font-size:.78rem;flex:1}
        .h-actions button:hover{background:#333;color:#eee}
        .h-actions .del{color:#c46b5a}
        .h-actions .del:hover{background:#2a1515;color:#ef5350}
        .empty{color:#555;font-size:.82rem;text-align:center;padding:16px}
    </style>
</head>
<body>
    <div class="gate" id="gate">
        <h1>🔒 Área Admin</h1>
        <p>Digite a senha para acessar</p>
        <input type="password" id="gatePass" placeholder="Senha" onkeydown="if(event.key==='Enter')checkGate()">
        <button onclick="checkGate()">Entrar</button>
        <div class="err" id="gateErr">Senha incorreta</div>
    </div>
    <div class="app-content" id="appContent">
    <h1>🔑 Gerador de Códigos — App Farm</h1>
    <div class="form">
        <div>
            <label>Nome do cliente</label>
            <input type="text" id="clientName" placeholder="Ex: João Silva">
        </div>
        <div>
            <label>App comprado</label>
            <select id="appSelect">
                <option value="clinica-facil">Clínica Fácil</option>
                <option value="interacoes">Interações Medicamentosas</option>
                <option value="prescripta">Prescripta</option>
                <option value="quit-tracker">Eliminador de Vícios</option>
                <option value="pare-de-fumar">Pare de Fumar</option>
                <option value="orcamento">Orçamento Pessoal</option>
                <option value="vocab-builder">Teste de Vocabulário</option>
                <option value="story-tracker">StoryTracker</option>
                <option value="guia-psicofarm">Guia Psicofarmacológico</option>
                <option value="bundle">Pacote Completo (9 apps)</option>
            </select>
        </div>
        <button onclick="generate()">Gerar código</button>
    </div>

    <div class="result" id="result">
        <div class="result-label">Código de acesso</div>
        <div class="result-code" id="codeDisplay" onclick="copyCode()"></div>
        <div class="copied" id="copied">✓ Copiado!</div>
        <div class="result-meta" id="resultMeta"></div>
        <button class="copy-btn" onclick="copyCode()">📋 Copiar código</button>
    </div>

    <div class="history">
        <h2>Histórico de códigos gerados</h2>
        <div id="historyList"><div class="empty">Nenhum código gerado ainda</div></div>
        <div class="h-actions">
            <button onclick="exportHistory()">📥 Exportar CSV</button>
            <button class="del" onclick="clearHistory()">🗑 Limpar histórico</button>
        </div>
    </div>

    <script>
    const SECRET = "appfarm2026x";

    function hashCode(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
            h = ((h << 5) - h + str.charCodeAt(i)) | 0;
        }
        return Math.abs(h);
    }

    function generateCode(appSlug, seed) {
        const raw = SECRET + appSlug + seed;
        const h = hashCode(raw);
        const hex = h.toString(16).toUpperCase().padStart(8, '0');
        return hex.slice(0, 4) + '-' + hex.slice(4, 8);
    }

    function getHistory() {
        try { return JSON.parse(localStorage.getItem('appfarm_codes') || '[]'); }
        catch { return []; }
    }

    function saveHistory(h) {
        localStorage.setItem('appfarm_codes', JSON.stringify(h));
    }

    function getNextSeed(appSlug) {
        const history = getHistory();
        const appCodes = history.filter(h => h.app === appSlug);
        return appCodes.length + 1;
    }

    function generate() {
        const name = document.getElementById('clientName').value.trim();
        const appSelect = document.getElementById('appSelect');
        const appSlug = appSelect.value;
        const appName = appSelect.options[appSelect.selectedIndex].text;

        if (!name) { document.getElementById('clientName').focus(); return; }

        const seed = getNextSeed(appSlug);
        const code = generateCode(appSlug, seed.toString());
        const now = new Date();
        const dateStr = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});

        const history = getHistory();
        history.unshift({ name, app: appSlug, appName, code, seed, date: dateStr });
        saveHistory(history);

        document.getElementById('codeDisplay').textContent = code;
        document.getElementById('resultMeta').innerHTML = `<strong>${name}</strong> · ${appName}<br>${dateStr}`;
        document.getElementById('result').style.display = 'block';

        document.getElementById('clientName').value = '';
        document.getElementById('clientName').focus();

        renderHistory();
    }

    function copyCode() {
        const code = document.getElementById('codeDisplay').textContent;
        navigator.clipboard.writeText(code);
        const el = document.getElementById('copied');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1500);
    }

    function renderHistory() {
        const history = getHistory();
        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div class="empty">Nenhum código gerado ainda</div>';
            return;
        }
        list.innerHTML = history.map(h =>
            `<div class="h-item">
                <div><span class="name">${h.name}</span><br><span class="app">${h.appName}</span></div>
                <div style="text-align:right"><span class="code">${h.code}</span><br><span class="date">${h.date}</span></div>
            </div>`
        ).join('');
    }

    function exportHistory() {
        const history = getHistory();
        if (!history.length) return;
        let csv = 'Cliente,App,Código,Data\n';
        history.forEach(h => { csv += `${h.name},${h.appName},${h.code},${h.date}\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'appfarm-codigos.csv'; a.click();
    }

    function clearHistory() {
        if (confirm('Limpar todo o histórico? Os códigos já gerados continuam válidos.')) {
            saveHistory([]);
            renderHistory();
        }
    }

    renderHistory();
    </script>
    </div><!-- /app-content -->
    <script>
    function checkGate(){
        var p=document.getElementById('gatePass').value;
        if(p==='farm2026'){
            document.getElementById('gate').style.display='none';
            document.getElementById('appContent').style.display='block';
        } else {
            document.getElementById('gateErr').style.display='block';
        }
    }
    </script>
</body>
</html>
