<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescripta — App Farm</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0c10;--card:#12151c;--card2:#181c25;--border:#222839;--text:#e8eaf0;--text2:#8b92a8;--text3:#5a6178;--accent:#6b8f5e;--accent-l:#8ab87a;--red:#c46b5a;--amber:#c4954a;--radius:12px;--font-d:'DM Serif Display',Georgia,serif;--font:'Outfit',system-ui,sans-serif}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
        .topbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .topbar a{color:var(--text3);text-decoration:none;font-size:.85rem}
        .topbar h1{font-family:var(--font-d);font-size:1.2rem;font-weight:400}
        .container{max-width:560px;margin:0 auto;padding:20px}
        .add-form{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
        .form-title{font-family:var(--font-d);font-size:1rem;font-weight:400;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .form-grid{display:grid;gap:10px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        input,select{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:.85rem;outline:none;width:100%}
        input:focus{border-color:var(--accent)}
        label{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:block}
        .add-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:100px;font-family:var(--font);font-size:.9rem;font-weight:500;cursor:pointer;margin-top:6px}
        .add-btn:hover{background:var(--accent-l)}
        .section-title{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
        .rx-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
        .rx-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s}
        .rx-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
        .rx-info h3{font-family:var(--font-d);font-size:1.05rem;font-weight:400;margin-bottom:2px}
        .rx-info .patient{font-size:.78rem;color:var(--text3)}
        .rx-status{padding:4px 10px;border-radius:100px;font-size:.7rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
        .status-ok{background:rgba(107,143,94,.15);color:var(--accent-l)}
        .status-warn{background:rgba(196,149,74,.15);color:var(--amber)}
        .status-expired{background:rgba(196,107,90,.15);color:var(--red)}
        .rx-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden;margin-bottom:8px}
        .rx-fill{height:100%;border-radius:3px;transition:width .5s}
        .fill-ok{background:var(--accent)}
        .fill-warn{background:var(--amber)}
        .fill-expired{background:var(--red)}
        .rx-details{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text3)}
        .rx-actions{display:flex;gap:8px;margin-top:10px}
        .rx-act{padding:6px 12px;background:var(--card2);border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .2s}
        .rx-act:hover{border-color:var(--accent);color:var(--accent-l)}
        .rx-act.del:hover{border-color:var(--red);color:var(--red)}
        .empty{text-align:center;padding:40px;color:var(--text3)}
        .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
        .s-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
        .s-box .v{font-family:var(--font-d);font-size:1.3rem}
        .s-box .l{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
        .v-ok{color:var(--accent-l)}.v-warn{color:var(--amber)}.v-bad{color:var(--red)}
    </style>
</head>
<body>
    <div class="topbar">
        <a href="../">← App Farm</a>
        <h1>💊 Prescripta</h1>
        <div></div>
    </div>
    <div class="container">
        <div class="summary-row" id="summary"></div>
        <div class="add-form">
            <div class="form-title">➕ Nova prescrição</div>
            <div class="form-grid">
                <div class="form-row">
                    <div><label>Paciente</label><input id="patient" placeholder="Nome"></div>
                    <div><label>Medicamento</label><input id="med" placeholder="Ex: Fluoxetina 20mg"></div>
                </div>
                <div class="form-row">
                    <div><label>Data da prescrição</label><input type="date" id="rxDate"></div>
                    <div><label>Duração (dias)</label><input type="number" id="duration" value="30" min="1"></div>
                </div>
                <button class="add-btn" onclick="addRx()">Adicionar prescrição</button>
            </div>
        </div>
        <div class="section-title"><span>Prescrições ativas</span><span id="countLabel"></span></div>
        <div class="rx-list" id="rxList"><div class="empty">Nenhuma prescrição cadastrada</div></div>
    </div>
    <script>
        let prescriptions = [];
        document.getElementById('rxDate').valueAsDate = new Date();

        function addRx() {
            const patient = document.getElementById('patient').value.trim();
            const med = document.getElementById('med').value.trim();
            const date = document.getElementById('rxDate').value;
            const duration = parseInt(document.getElementById('duration').value);
            if (!patient || !med || !date || !duration) return;
            prescriptions.push({id: Date.now(), patient, med, startDate: date, duration});
            document.getElementById('patient').value = '';
            document.getElementById('med').value = '';
            document.getElementById('duration').value = '30';
            render();
        }

        function renewRx(id) {
            const rx = prescriptions.find(r => r.id === id);
            if (rx) {
                rx.startDate = new Date().toISOString().slice(0, 10);
                render();
            }
        }

        function deleteRx(id) {
            prescriptions = prescriptions.filter(r => r.id !== id);
            render();
        }

        function getStatus(rx) {
            const start = new Date(rx.startDate);
            const end = new Date(start);
            end.setDate(end.getDate() + rx.duration);
            const now = new Date();
            const total = rx.duration;
            const elapsed = Math.floor((now - start) / 86400000);
            const remaining = total - elapsed;
            const pct = Math.max(0, Math.min(100, (remaining / total) * 100));
            
            let status = 'ok', label = 'Coberto';
            if (remaining <= 0) { status = 'expired'; label = 'Expirado'; }
            else if (remaining <= 7) { status = 'warn'; label = remaining + 'd restantes'; }
            
            return { status, label, remaining, pct, endDate: end.toLocaleDateString('pt-BR'), startDate: start.toLocaleDateString('pt-BR'), elapsed };
        }

        function render() {
            let ok = 0, warn = 0, expired = 0;
            prescriptions.forEach(rx => {
                const s = getStatus(rx);
                if (s.status === 'ok') ok++;
                else if (s.status === 'warn') warn++;
                else expired++;
            });

            document.getElementById('summary').innerHTML = `
                <div class="s-box"><div class="v v-ok">${ok}</div><div class="l">Cobertos</div></div>
                <div class="s-box"><div class="v v-warn">${warn}</div><div class="l">Atenção</div></div>
                <div class="s-box"><div class="v v-bad">${expired}</div><div class="l">Expirados</div></div>`;

            document.getElementById('countLabel').textContent = prescriptions.length + ' total';

            if (prescriptions.length === 0) {
                document.getElementById('rxList').innerHTML = '<div class="empty">Nenhuma prescrição cadastrada</div>';
                return;
            }

            // Sort: expired first, then warn, then ok
            const sorted = [...prescriptions].sort((a, b) => {
                const sa = getStatus(a), sb = getStatus(b);
                const order = {expired: 0, warn: 1, ok: 2};
                return order[sa.status] - order[sb.status] || sa.remaining - sb.remaining;
            });

            document.getElementById('rxList').innerHTML = sorted.map(rx => {
                const s = getStatus(rx);
                return `<div class="rx-card">
                    <div class="rx-top">
                        <div class="rx-info">
                            <h3>${rx.med}</h3>
                            <div class="patient">${rx.patient}</div>
                        </div>
                        <span class="rx-status status-${s.status}">${s.label}</span>
                    </div>
                    <div class="rx-bar"><div class="rx-fill fill-${s.status}" style="width:${s.pct}%"></div></div>
                    <div class="rx-details">
                        <span>Início: ${s.startDate}</span>
                        <span>Expira: ${s.endDate}</span>
                    </div>
                    <div class="rx-actions">
                        <button class="rx-act" onclick="renewRx(${rx.id})">↻ Renovar</button>
                        <button class="rx-act del" onclick="deleteRx(${rx.id})">✕ Remover</button>
                    </div>
                </div>`;
            }).join('');
        }

        render();
    </script>
</body>
</html>
