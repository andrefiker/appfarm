<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Life RPG</title>
<style>
:root {
  --bg: #f5f4f0;
  --bg-card: #ffffff;
  --bg-input: #f0eeea;
  --bg-hover: #e8e6e1;
  --border: #ddd9d1;
  --border-light: #eae7e0;
  --text: #2c2c2c;
  --text-secondary: #6b6960;
  --text-muted: #9e9a90;
  --gold: #b8860b;
  --gold-light: #daa520;
  --gold-bg: rgba(184,134,11,0.08);
  --gold-border: rgba(184,134,11,0.2);
  --teal: #2a7f8f;
  --teal-bg: rgba(42,127,143,0.08);
  --green: #3d8c40;
  --green-bg: rgba(61,140,64,0.08);
  --red: #c0392b;
  --red-bg: rgba(192,57,43,0.08);
  --orange: #c97d1e;
  --purple: #7b5ea7;
  --pink: #a85d8a;
  --blue: #3a6fb5;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg-card);}
.header h1{font-size:18px;font-weight:700;letter-spacing:0.5px;color:var(--gold);}
.header .level-badge{font-size:12px;color:var(--gold);border:1px solid var(--gold-border);padding:2px 10px;border-radius:20px;background:var(--gold-bg);font-weight:600;}
.tab-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;}
.tab-bar{display:flex;border-top:1px solid var(--border);background:var(--bg-card);padding:6px 4px 10px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-muted);font-size:10px;padding:4px 2px;cursor:pointer;transition:color 0.2s;font-family:var(--font);}
.tab-btn.active{color:var(--gold);}
.tab-btn svg{width:20px;height:20px;}

.card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border-light);box-shadow:var(--shadow);}
.card-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}
.card-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:14px;font-family:var(--font);font-weight:600;transition:all 0.2s;}
.btn-gold{background:var(--gold);color:white;}
.btn-gold:active{transform:scale(0.97);background:var(--gold-light);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:active{background:var(--bg-input);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger{background:var(--red);color:white;}
.btn-block{width:100%;justify-content:center;}

input,select,textarea{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg);}
textarea{resize:vertical;min-height:60px;}
select{appearance:none;cursor:pointer;}

/* XP Bars */
.xp-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.xp-bar-label{font-size:13px;font-weight:600;min-width:100px;display:flex;align-items:center;gap:6px;}
.xp-bar-label .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.xp-bar-track{flex:1;height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden;}
.xp-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.xp-bar-level{font-size:12px;color:var(--text-muted);min-width:36px;text-align:right;font-weight:700;}

/* Streaks */
.streak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);}
.streak-row:last-child{border-bottom:none;}
.streak-name{font-size:13px;}
.streak-count{font-size:14px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:4px;}

/* Log */
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light);}
.log-entry:last-child{border-bottom:none;}
.log-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--green);}
.log-text{flex:1;font-size:14px;}
.log-xp{font-size:12px;color:var(--gold);font-weight:600;}
.log-domain-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.log-delete{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px;}

/* Goals */
.goal-card{background:var(--bg-card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border-light);box-shadow:var(--shadow);}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.goal-title{font-size:15px;font-weight:600;}
.goal-progress-text{font-size:12px;color:var(--gold);font-weight:600;}
.goal-progress-bar{height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.goal-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:3px;transition:width 0.4s;}
.step-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;}
.step-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:11px;color:transparent;background:var(--bg-input);}
.step-check.done{border-color:var(--green);background:var(--green);color:white;}
.step-text{flex:1;}
.step-text.done{text-decoration:line-through;color:var(--text-muted);}

/* Quests */
.quest-card{background:var(--bg-card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border-light);border-left:3px solid var(--gold);box-shadow:var(--shadow);}
.quest-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.quest-meta{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.quest-progress{display:flex;align-items:center;gap:8px;}

/* Reflection */
.slider-group{margin-bottom:16px;}
.slider-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:600;}
.slider-label span:last-child{color:var(--gold);font-weight:700;}
input[type="range"]{-webkit-appearance:none;width:100%;height:6px;background:var(--bg-input);border-radius:3px;border:none;padding:0;box-shadow:none;}
input[type="range"]:focus{box-shadow:none;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.15);}

/* Radar */
#radarCanvas{display:block;margin:0 auto;}

/* Report */
.report-stat{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border-light);}
.report-stat:last-child{border-bottom:none;}
.report-val{font-weight:600;color:var(--gold);}
.insight-box{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--radius-sm);padding:12px;margin-top:8px;font-size:13px;line-height:1.6;}
.insight-box strong{color:var(--gold);}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--bg-card);border-radius:var(--radius);padding:20px;width:100%;max-width:420px;border:1px solid var(--border-light);max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{font-size:16px;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.form-actions{display:flex;gap:8px;margin-top:16px;}
.form-actions .btn{flex:1;}

/* Activity picker chips */
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg-input);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:var(--font);color:var(--text-secondary);}
.chip:active{transform:scale(0.96);}
.chip.selected{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold);font-weight:600;}

/* Cadastro / Onboarding */
.onboard-screen{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);}
.onboard-content{flex:1;overflow-y:auto;padding:24px 20px;}
.onboard-header{text-align:center;margin-bottom:24px;}
.onboard-header h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.onboard-header p{font-size:14px;color:var(--text-secondary);line-height:1.5;}
.onboard-footer{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg-card);}
.onboard-step{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:8px;}
.onboard-progress{height:4px;background:var(--bg-input);border-radius:2px;margin-bottom:16px;}
.onboard-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s;}

.goal-option{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all 0.2s;background:var(--bg-card);}
.goal-option:active{transform:scale(0.98);}
.goal-option.selected{border-color:var(--gold);background:var(--gold-bg);}
.goal-option .go-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.goal-option .go-desc{font-size:12px;color:var(--text-secondary);}
.goal-option .go-check{float:right;width:20px;height:20px;border-radius:50%;border:2px solid var(--border);margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.goal-option.selected .go-check{border-color:var(--gold);background:var(--gold);color:white;}

/* Domain section in onboarding */
.domain-section{margin-bottom:20px;}
.domain-section-title{font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}

/* Settings */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-light);}
.setting-row:last-child{border-bottom:none;}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-state .icon{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:14px;margin-bottom:16px;}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:white;padding:12px 24px;border-radius:var(--radius);font-weight:700;font-size:15px;z-index:200;box-shadow:var(--shadow-lg);animation:toastIn 0.4s ease,toastOut 0.4s ease 2.6s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease;}
.today-date{font-size:12px;color:var(--text-muted);}
</style>
</head>

const XP_PER_LEVEL = 50;
const STREAK_FORGIVENESS = 1;

function today(){return new Date().toISOString().slice(0,10);}
function weekAgo(){const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}

// XP
function getDomainXP(d){return logs.filter(l=>l.domain===d).reduce((s,l)=>s+(l.xp||5),0);}
function getDomainLevel(d){return Math.floor(getDomainXP(d)/XP_PER_LEVEL)+1;}
function getDomainProgress(d){return(getDomainXP(d)%XP_PER_LEVEL)/XP_PER_LEVEL;}
function getGlobalLevel(){const t=DOMAINS.reduce((s,d)=>s+getDomainXP(d.id),0);return Math.floor(t/(XP_PER_LEVEL*DOMAINS.length))+1;}
function getTodayLogs(){return logs.filter(l=>l.date===today());}
function getWeekLogs(){const w=weekAgo();return logs.filter(l=>l.date>=w);}

// Streaks
function getStreaks(){
  const dd={};DOMAINS.forEach(d=>dd[d.id]={});
  logs.forEach(l=>{if(dd[l.domain])dd[l.domain][l.date]=true;});
  const r=[];
  DOMAINS.forEach(d=>{const days=dd[d.id];let streak=0,missed=0;const t=new Date();
    for(let i=0;i<365;i++){const dt=new Date(t);dt.setDate(dt.getDate()-i);const ds=dt.toISOString().slice(0,10);
      if(days[ds]){streak++;missed=0;}else{missed++;if(missed>STREAK_FORGIVENESS)break;if(i>0)streak++;}}
    if(streak>0)r.push({domain:d,streak});});
  return r.sort((a,b)=>b.streak-a.streak);
}

// Insights
function generateInsights(){
  const ins=[];const wl=getWeekLogs();const wr=reflections.filter(r=>r.date>=weekAgo());
  const dc={};DOMAINS.forEach(d=>dc[d.id]=0);wl.forEach(l=>dc[l.domain]=(dc[l.domain]||0)+1);
  const neg=DOMAINS.filter(d=>dc[d.id]===0);
  if(neg.length>0)ins.push({type:'warning',text:`No activity in ${neg.map(d=>d.name).join(', ')} this week. Even a small step in ${neg[0]?.name} would count.`});
  if(wr.length>=3){
    const hsd=wr.filter(r=>r.stress>=4).map(r=>r.date);
    const exd=wl.filter(l=>l.domain==='health').map(l=>l.date);
    const swe=hsd.filter(d=>!exd.includes(d));
    if(swe.length>=2)ins.push({type:'pattern',text:`Stress was high on ${swe.length} days without Health activity. Physical movement on high-stress days tends to help regulate.`});
    const am=wr.reduce((s,r)=>s+r.mood,0)/wr.length;
    if(am<=2)ins.push({type:'alert',text:`Average mood: ${am.toFixed(1)}/5. Consider what's weighing on you and whether small routine shifts might help.`});
    else if(am>=4)ins.push({type:'positive',text:`Average mood: ${am.toFixed(1)}/5. Good week. Notice what contributed to this.`});
  }
  const so=Object.entries(dc).sort((a,b)=>b[1]-a[1]);
  if(so[0]&&so[0][1]>0){const td=DOMAINS.find(d=>d.id===so[0][0]);ins.push({type:'strength',text:`${td?.name} was your strongest domain this week with ${so[0][1]} actions.`});}
  const streaks=getStreaks();const lsd=DOMAINS.filter(d=>!streaks.find(s=>s.domain.id===d.id));
  if(lsd.length>0&&quests.filter(q=>!q.done).length<3){ins.push({type:'quest',text:`Suggested quest: Log 3 ${lsd[0].name} actions this week.`,domain:lsd[0]});}
  return ins;
}

function drawRadar(){
  const canvas=document.getElementById('radarCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=100;
  ctx.clearRect(0,0,W,H);const n=DOMAINS.length;
  const angles=DOMAINS.map((_,i)=>(Math.PI*2*i/n)-Math.PI/2);
  for(let r=1;r<=5;r++){ctx.beginPath();const rr=R*r/5;angles.forEach((a,i)=>{const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.closePath();ctx.strokeStyle='rgba(200,195,185,0.5)';ctx.lineWidth=1;ctx.stroke();}
  angles.forEach(a=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);ctx.strokeStyle='rgba(200,195,185,0.3)';ctx.stroke();});
  const maxLvl=20;ctx.beginPath();
  DOMAINS.forEach((d,i)=>{const lvl=Math.min(getDomainLevel(d.id),maxLvl);const ratio=lvl/maxLvl;const x=cx+Math.cos(angles[i])*R*ratio,y=cy+Math.sin(angles[i])*R*ratio;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.closePath();ctx.fillStyle='rgba(184,134,11,0.12)';ctx.fill();ctx.strokeStyle='rgba(184,134,11,0.6)';ctx.lineWidth=2;ctx.stroke();
  DOMAINS.forEach((d,i)=>{const lvl=Math.min(getDomainLevel(d.id),maxLvl);const ratio=lvl/maxLvl;const x=cx+Math.cos(angles[i])*R*ratio,y=cy+Math.sin(angles[i])*R*ratio;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=d.color;ctx.fill();
    const lx=cx+Math.cos(angles[i])*(R+18),ly=cy+Math.sin(angles[i])*(R+18);
    ctx.font='11px system-ui';ctx.fillStyle='#9e9a90';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${d.icon}${d.name}`,lx,ly);});
}

    const ba=BA_ACTIVITIES[d.id];
    const allActs=[...ba.mastery.map(a=>({...a,type:'mastery'})),...ba.pleasure.map(a=>({...a,type:'pleasure'}))];
    return `<div class="domain-section">
      <div class="domain-section-title" style="margin-top:8px"><span style="color:${d.color}">${d.icon}</span> ${d.name}</div>
      <div class="chip-group">
        ${allActs.map(a=>{
          const done=todayIds.includes(a.text);
          return `<span class="chip ${done?'selected':''}" style="${done?`background:${d.color}14;border-color:${d.color}40;color:${d.color}`:''}" onclick="${done?'':`logActivity('${d.id}','${a.text.replace(/'/g,"\\'")}',${a.xp})`}">${a.type==='pleasure'?'✦ ':''}${a.text} <span style="font-size:10px;opacity:0.7">+${a.xp}</span></span>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function logActivity(domain,text,xp){
  const prev=getDomainLevel(domain);
  logs.push({id:Date.now().toString(),text,domain,date:today(),xp,ts:Date.now()});
  persist();
  const nxt=getDomainLevel(domain);
  if(nxt>prev){const d=DOMAINS.find(x=>x.id===domain);showToast(`${d?.icon} ${d?.name} Level ${nxt}!`);}
  renderTab();
}

function addCustomLog(){
  const text=document.getElementById('customLogText')?.value?.trim();
  const domain=document.getElementById('customLogDomain')?.value;
  if(!text)return;
  logActivity(domain,text,5);
}

function addRestDay(){logActivity('mind','Rest & Recovery Day',5);}
function deleteLog(id){logs=logs.filter(l=>l.id!==id);persist();renderTab();}

// ===== GOALS =====
function renderGoals(c){
  c.innerHTML=`
    <div class="card-title-row" style="margin-bottom:12px"><span class="card-title" style="margin:0">Goals</span>
      <button class="btn btn-gold btn-sm" onclick="showGoalModal()">+ New Goal</button></div>
    ${goals.length===0?'<div class="empty-state"><div class="icon">🎯</div><p>No goals yet.</p></div>':''}
    ${goals.map(g=>{const d=DOMAINS.find(x=>x.id===g.domain);const total=g.steps.length||1;const done=g.steps.filter(s=>s.done).length;const pct=Math.round(done/total*100);
      return `<div class="goal-card fade-in"><div class="goal-header"><div class="goal-title">${d?d.icon:''} ${g.title}</div><div style="display:flex;align-items:center;gap:8px"><span class="goal-progress-text">${pct}%</span><button class="log-delete" onclick="deleteGoal('${g.id}')">×</button></div></div>
        <div class="goal-progress-bar"><div class="goal-progress-fill" style="width:${pct}%"></div></div>
        ${g.steps.map(s=>`<div class="step-item"><div class="step-check ${s.done?'done':''}" onclick="toggleStep('${g.id}','${s.id}')">✓</div><span class="step-text ${s.done?'done':''}">${s.text}</span></div>`).join('')}
        <div style="margin-top:8px"><input placeholder="Add a step..." style="font-size:12px;padding:6px 10px" onkeydown="if(event.key==='Enter'){addStep('${g.id}',this.value);this.value=''}"></div>
      </div>`;}).join('')}
  `;
}

function showGoalModal(){
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal fade-in">
        <h3>New Goal</h3>
        <div class="form-group"><label>Choose from templates or write your own</label>
          <select id="goalTemplate" onchange="fillGoalTemplate()">
            <option value="">— Write custom goal —</option>
            ${DOMAINS.map(d=>(GOAL_OPTIONS[d.id]||[]).map((g,i)=>`<option value="${d.id}:${i}">${d.icon} ${g.title}</option>`).join('')).join('')}
          </select>
        </div>
        <div class="form-group"><label>Goal Title</label><input id="goalTitle" placeholder="e.g. Improve cardiovascular health"></div>
        <div class="form-group"><label>Domain</label><select id="goalDomain">${DOMAINS.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>Steps (one per line)</label><textarea id="goalSteps" rows="4" placeholder="Walk 20 minutes\nSchedule blood test"></textarea></div>
        <div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="createGoal()">Create</button></div>
      </div>
    </div>`;
}

function fillGoalTemplate(){
  const v=document.getElementById('goalTemplate')?.value;if(!v)return;
  const[domId,idx]=v.split(':');const g=GOAL_OPTIONS[domId]?.[parseInt(idx)];if(!g)return;
  document.getElementById('goalTitle').value=g.title;
  document.getElementById('goalDomain').value=domId;
  document.getElementById('goalSteps').value=g.steps.join('\n');
}

function createGoal(){
  const title=document.getElementById('goalTitle')?.value?.trim();const domain=document.getElementById('goalDomain')?.value;
  const stepsText=document.getElementById('goalSteps')?.value?.trim();if(!title)return;
  const steps=stepsText?stepsText.split('\n').filter(s=>s.trim()).map(s=>({id:Date.now().toString()+Math.random().toString(36).slice(2,6),text:s.trim(),done:false})):[];
  goals.push({id:Date.now().toString(),title,domain,steps});persist();closeModal();renderTab();
}

function toggleStep(goalId,stepId){
  const goal=goals.find(g=>g.id===goalId);if(!goal)return;
  const step=goal.steps.find(s=>s.id===stepId);if(!step)return;
  step.done=!step.done;
  if(step.done){const prev=getDomainLevel(goal.domain);logs.push({id:Date.now().toString(),text:`Goal step: ${step.text}`,domain:goal.domain,date:today(),xp:5,ts:Date.now()});const nxt=getDomainLevel(goal.domain);if(nxt>prev){const d=DOMAINS.find(x=>x.id===goal.domain);showToast(`${d?.icon} ${d?.name} Level ${nxt}!`);}}
  persist();renderTab();
}

function addStep(goalId,text){if(!text?.trim())return;const goal=goals.find(g=>g.id===goalId);if(!goal)return;goal.steps.push({id:Date.now().toString()+Math.random().toString(36).slice(2,6),text:text.trim(),done:false});persist();renderTab();}
function deleteGoal(id){if(!confirm('Delete this goal?'))return;goals=goals.filter(g=>g.id!==id);persist();renderTab();}

// ===== QUESTS =====
function renderQuests(c){
  const active=quests.filter(q=>!q.done);const completed=quests.filter(q=>q.done);const qInsights=generateInsights().filter(i=>i.type==='quest');
  c.innerHTML=`
    <div class="card-title-row" style="margin-bottom:12px"><span class="card-title" style="margin:0">Active Quests</span><button class="btn btn-gold btn-sm" onclick="showQuestModal()">+ New Quest</button></div>
    ${qInsights.map(i=>`<div class="quest-card fade-in" style="border-left-color:var(--teal)"><div class="quest-title">💡 Suggested</div><div class="quest-meta">${i.text}</div><button class="btn btn-outline btn-sm" onclick="autoCreateQuest('${i.domain?.id}')">Accept Quest</button></div>`).join('')}
    ${active.length===0&&qInsights.length===0?'<div class="empty-state"><div class="icon">⭐</div><p>No active quests.</p></div>':''}
    ${active.map(q=>{const d=DOMAINS.find(x=>x.id===q.domain);const pct=Math.min(100,Math.round((q.current/q.target)*100));const dl=q.deadline?daysBetween(today(),q.deadline):null;
      return `<div class="quest-card fade-in"><div class="quest-title">${d?d.icon:''} ${q.title}</div><div class="quest-meta">${q.current}/${q.target} ${q.unit}${dl!==null?` · ${dl>0?dl+'d left':'Due today!'}`:''}
      </div><div class="quest-progress"><div class="xp-bar-track" style="flex:1"><div class="xp-bar-fill" style="width:${pct}%;background:var(--gold)"></div></div><span style="font-size:12px;color:var(--gold);font-weight:600">${pct}%</span><button class="btn btn-outline btn-sm" onclick="incrementQuest('${q.id}')" style="padding:4px 10px">+1</button>${pct>=100?`<button class="btn btn-gold btn-sm" onclick="completeQuest('${q.id}')" style="padding:4px 10px">✓</button>`:''}</div></div>`;}).join('')}
    ${completed.length>0?`<div class="card-title" style="margin-top:20px">Completed</div>${completed.slice(0,5).map(q=>{const d=DOMAINS.find(x=>x.id===q.domain);return `<div class="quest-card" style="opacity:0.6;border-left-color:var(--green)"><div class="quest-title">${d?d.icon:''} ${q.title}</div><div class="quest-meta">Completed ✓</div></div>`;}).join('')}`:''}
  `;
}

function showQuestModal(){
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal fade-in"><h3>New Quest</h3>
    <div class="form-group"><label>Quest Title</label><input id="questTitle" placeholder="e.g. 7-day exercise streak"></div>
    <div class="form-group"><label>Domain</label><select id="questDomain">${DOMAINS.map(d=>`<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}</select></div>
    <div class="form-group" style="display:flex;gap:8px"><div style="flex:1"><label>Target</label><input id="questTarget" type="number" value="7" min="1"></div><div style="flex:1"><label>Unit</label><input id="questUnit" value="actions"></div></div>
    <div class="form-group"><label>Deadline (optional)</label><input id="questDeadline" type="date"></div>
    <div class="form-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="createQuest()">Create</button></div></div></div>`;
}

function createQuest(){const title=document.getElementById('questTitle')?.value?.trim();const domain=document.getElementById('questDomain')?.value;const target=parseInt(document.getElementById('questTarget')?.value)||7;const unit=document.getElementById('questUnit')?.value?.trim()||'actions';const deadline=document.getElementById('questDeadline')?.value||null;if(!title)return;quests.push({id:Date.now().toString(),title,domain,target,current:0,unit,deadline,done:false});persist();closeModal();renderTab();}
function autoCreateQuest(domainId){const d=DOMAINS.find(x=>x.id===domainId);if(!d)return;quests.push({id:Date.now().toString(),title:`3 ${d.name} actions this week`,domain:d.id,target:3,current:0,unit:'actions',deadline:new Date(Date.now()+7*86400000).toISOString().slice(0,10),done:false});persist();renderTab();}
function incrementQuest(id){const q=quests.find(x=>x.id===id);if(!q||q.done)return;q.current++;if(q.current>=q.target){const prev=getDomainLevel(q.domain);logs.push({id:Date.now().toString(),text:`Quest completed: ${q.title}`,domain:q.domain,date:today(),xp:15,ts:Date.now()});const nxt=getDomainLevel(q.domain);if(nxt>prev){const d=DOMAINS.find(x=>x.id===q.domain);showToast(`${d?.icon} ${d?.name} Level ${nxt}!`);}}persist();renderTab();}
function completeQuest(id){const q=quests.find(x=>x.id===id);if(!q)return;q.done=true;showToast('⭐ Quest Complete!');persist();renderTab();}

// ===== REFLECT =====
function renderReflect(c){
  const tr=reflections.find(r=>r.date===today());
  c.innerHTML=`
    <div class="card"><div class="card-title">Evening Reflection</div>
      <div class="today-date" style="margin-bottom:16px">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      <div class="slider-group"><div class="slider-label"><span>Mood</span><span id="moodVal">${tr?.mood||3}</span></div><input type="range" id="moodSlider" min="1" max="5" value="${tr?.mood||3}" oninput="document.getElementById('moodVal').textContent=this.value"></div>
      <div class="slider-group"><div class="slider-label"><span>Energy</span><span id="energyVal">${tr?.energy||3}</span></div><input type="range" id="energySlider" min="1" max="5" value="${tr?.energy||3}" oninput="document.getElementById('energyVal').textContent=this.value"></div>
      <div class="slider-group"><div class="slider-label"><span>Stress</span><span id="stressVal">${tr?.stress||3}</span></div><input type="range" id="stressSlider" min="1" max="5" value="${tr?.stress||3}" oninput="document.getElementById('stressVal').textContent=this.value"></div>
      <div class="form-group"><label>One thing that went well today?</label><textarea id="reflectNote" rows="3" placeholder="A small win, a moment of clarity...">${tr?.note||''}</textarea></div>
      <button class="btn btn-gold btn-block" onclick="saveReflection()">${tr?'Update':'Save'} Reflection</button>
    </div>
    <div class="card"><div class="card-title">Recent Reflections</div>
      ${reflections.filter(r=>r.date!==today()).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7).map(r=>{
        const dn=new Date(r.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        return `<div style="padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--text-muted)">${dn}</span><span>😊${r.mood} ⚡${r.energy} 😰${r.stress}</span></div>${r.note?`<div style="color:var(--text-secondary);font-style:italic">"${r.note}"</div>`:''}</div>`;}).join('')}
      ${reflections.length===0?'<div style="font-size:13px;color:var(--text-muted)">No reflections yet.</div>':''}
    </div>
  `;
}

function saveReflection(){
  const mood=parseInt(document.getElementById('moodSlider')?.value)||3;const energy=parseInt(document.getElementById('energySlider')?.value)||3;
  const stress=parseInt(document.getElementById('stressSlider')?.value)||3;const note=document.getElementById('reflectNote')?.value?.trim()||'';
  const existing=reflections.findIndex(r=>r.date===today());const entry={date:today(),mood,energy,stress,note};
  if(existing>=0)reflections[existing]=entry;else reflections.push(entry);persist();showToast('Reflection saved');renderTab();
}

// ===== REPORT =====
function renderReport(c){
  const wl=getWeekLogs();const wr=reflections.filter(r=>r.date>=weekAgo());const insights=generateInsights();
  const totalXP=wl.reduce((s,l)=>s+(l.xp||5),0);const activeDays=[...new Set(wl.map(l=>l.date))].length;
  const avgM=wr.length?(wr.reduce((s,r)=>s+r.mood,0)/wr.length).toFixed(1):'-';
  const avgE=wr.length?(wr.reduce((s,r)=>s+r.energy,0)/wr.length).toFixed(1):'-';
  const avgS=wr.length?(wr.reduce((s,r)=>s+r.stress,0)/wr.length).toFixed(1):'-';

  c.innerHTML=`
    <div class="card"><div class="card-title-row"><span class="card-title" style="margin:0">Weekly Report</span><span class="today-date">${weekAgo()} → ${today()}</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="text-align:center;padding:10px;background:var(--bg-input);border-radius:var(--radius-sm)"><div style="font-size:22px;font-weight:700;color:var(--gold)">${totalXP}</div><div style="font-size:11px;color:var(--text-muted)">Total XP</div></div>
        <div style="text-align:center;padding:10px;background:var(--bg-input);border-radius:var(--radius-sm)"><div style="font-size:22px;font-weight:700;color:var(--teal)">${wl.length}</div><div style="font-size:11px;color:var(--text-muted)">Actions</div></div>
        <div style="text-align:center;padding:10px;background:var(--bg-input);border-radius:var(--radius-sm)"><div style="font-size:22px;font-weight:700;color:var(--green)">${activeDays}/7</div><div style="font-size:11px;color:var(--text-muted)">Active Days</div></div>
      </div>
    </div>
    <div class="card"><div class="card-title">Domain Breakdown</div>
      ${DOMAINS.map(d=>{const dl=wl.filter(l=>l.domain===d.id);return `<div class="report-stat"><span>${d.icon} ${d.name}</span><span><span class="report-val">${dl.length} actions · +${dl.reduce((s,l)=>s+(l.xp||5),0)} XP</span> · L${getDomainLevel(d.id)}</span></div>`;}).join('')}
    </div>
    ${wr.length>0?`<div class="card"><div class="card-title">Wellbeing Averages</div><div class="report-stat"><span>Mood</span><span class="report-val">${avgM}/5</span></div><div class="report-stat"><span>Energy</span><span class="report-val">${avgE}/5</span></div><div class="report-stat"><span>Stress</span><span class="report-val">${avgS}/5</span></div></div>`:''}
    ${insights.length>0?`<div class="card"><div class="card-title">Insights & Suggestions</div>${insights.map(i=>`<div class="insight-box" style="margin-bottom:8px"><strong>${i.type==='warning'?'⚠️':i.type==='pattern'?'🔍':i.type==='strength'?'💪':i.type==='positive'?'✨':i.type==='alert'?'🚨':'💡'}</strong> ${i.text}</div>`).join('')}</div>`:''}
    <div class="card"><div class="card-title">Export</div>
      <button class="btn btn-gold btn-block" onclick="emailReport()" style="margin-bottom:8px">📧 Email Weekly Report</button>
      <button class="btn btn-outline btn-block" onclick="exportData()">💾 Export All Data (JSON)</button>
      <div style="margin-top:8px"><button class="btn btn-outline btn-block btn-sm" onclick="importData()">📂 Import Data</button></div>
    </div>
    <div class="card"><div class="card-title">Settings</div>
      <div class="setting-row"><span>Name</span><input value="${settings.userName||''}" style="width:120px;text-align:right" onchange="settings.userName=this.value;persist()"></div>
      <div class="setting-row"><span>Email for Reports</span><input value="${settings.email||''}" placeholder="your@email.com" style="width:180px;text-align:right" onchange="settings.email=this.value;persist()"></div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="profile=null;persist();location.reload()">Redo Onboarding</button>
        <button class="btn btn-danger btn-sm" onclick="if(confirm('Clear ALL data?')){localStorage.clear();location.reload()}">Reset All</button>
      </div>
    </div>
  `;
}

function emailReport(){
  const wl=getWeekLogs();const wr=reflections.filter(r=>r.date>=weekAgo());const insights=generateInsights();const streaks=getStreaks();
  const totalXP=wl.reduce((s,l)=>s+(l.xp||5),0);const activeDays=[...new Set(wl.map(l=>l.date))].length;
  const avgM=wr.length?(wr.reduce((s,r)=>s+r.mood,0)/wr.length).toFixed(1):'N/A';
  const avgE=wr.length?(wr.reduce((s,r)=>s+r.energy,0)/wr.length).toFixed(1):'N/A';
  const avgS=wr.length?(wr.reduce((s,r)=>s+r.stress,0)/wr.length).toFixed(1):'N/A';

  let body=`LIFE RPG - Weekly Report\n${weekAgo()} to ${today()}\nGlobal Level: ${getGlobalLevel()}\n\n--- SUMMARY ---\nTotal XP: ${totalXP}\nActions: ${wl.length}\nActive Days: ${activeDays}/7\n\n--- DOMAINS ---\n`;
  DOMAINS.forEach(d=>{const dl=wl.filter(l=>l.domain===d.id);body+=`${d.name}: ${dl.length} actions, +${dl.reduce((s,l)=>s+(l.xp||5),0)} XP, Level ${getDomainLevel(d.id)}\n`;});
  body+=`\n--- WELLBEING ---\nAvg Mood: ${avgM}/5\nAvg Energy: ${avgE}/5\nAvg Stress: ${avgS}/5\n\n`;
  if(streaks.length>0){body+='--- STREAKS ---\n';streaks.forEach(s=>body+=`${s.domain.name}: ${s.streak} days\n`);body+='\n';}
  if(insights.length>0){body+='--- INSIGHTS ---\n';insights.forEach(i=>body+=`• ${i.text}\n`);}
  const subject=`Life RPG Report - Week of ${weekAgo()}`;
  window.location.href=`mailto:${settings.email||''}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function exportData(){const data={logs,goals,quests,reflections,profile,settings,exported:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`life-rpg-${today()}.json`;a.click();URL.revokeObjectURL(url);}
function importData(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.logs)logs=data.logs;if(data.goals)goals=data.goals;if(data.quests)quests=data.quests;if(data.reflections)reflections=data.reflections;if(data.profile)profile=data.profile;if(data.settings)settings=data.settings;persist();showToast('Data imported!');renderApp();}catch(err){alert('Invalid file: '+err.message);}};reader.readAsText(file);};input.click();}

// ===== INIT =====
if(!profile){renderOnboarding();}else{renderApp();}
</script>
</body>
</html>
